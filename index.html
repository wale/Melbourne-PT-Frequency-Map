<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melbourne PT Frequency Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 3rem;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 0.25rem;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #666;
    margin-bottom: 1.25rem;
  }

  .map-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    cursor: grab;
  }
  .map-container.panning { cursor: grabbing; }

  /* Zoom controls */
  .zoom-controls {
    position: absolute;
    bottom: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    z-index: 20;
  }
  .zoom-btn {
    width: 30px;
    height: 30px;
    background: #fff;
    border: 1px solid #bbb;
    border-radius: 5px;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    color: #333;
    font-weight: 300;
    transition: background 0.1s;
    user-select: none;
  }
  .zoom-btn:hover { background: #f0f0f0; }
  .zoom-reset {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: -0.03em;
  }

  #map-svg-wrapper {
    width: 100%;
    display: block;
    overflow: hidden;
    touch-action: none;
  }

  #map-svg-wrapper svg {
    width: 100%;
    height: auto;
    display: block;
    transform-origin: 0 0;
    transition: transform 0.05s linear;
    will-change: transform;
  }

  /* Legend toggle button */
  .legend-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #fff;
    border: 1px solid #bbb;
    border-radius: 6px;
    padding: 6px 11px 6px 9px;
    font-size: 12px;
    font-weight: 600;
    font-family: Arial, Helvetica, sans-serif;
    color: #222;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    z-index: 20;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    transition: background 0.12s;
  }
  .legend-btn:hover { background: #f5f5f5; }
  .legend-btn svg { flex-shrink: 0; }
  .legend-btn .arrow { transition: transform 0.18s; }
  .legend-btn.open .arrow { transform: rotate(180deg); }

  /* Dropdown panel */
  .legend-panel {
    position: absolute;
    top: 44px;
    right: 10px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 7px;
    padding: 12px 14px 10px;
    min-width: 215px;
    z-index: 20;
    box-shadow: 0 4px 16px rgba(0,0,0,0.13);
    opacity: 0;
    pointer-events: none;
    transform: translateY(-6px);
    transition: opacity 0.18s, transform 0.18s;
  }
  .legend-panel.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .legend-section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
    margin-bottom: 8px;
    margin-top: 4px;
  }
  .legend-section-title:first-child { margin-top: 0; }

  .legend-divider {
    border: none;
    border-top: 1px solid #eee;
    margin: 8px 0;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 3px 2px;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.15s;
    user-select: none;
  }
  .legend-row:hover { background: #f8f8f8; }
  .legend-row.hidden { opacity: 0.35; }

  .legend-row input[type="checkbox"] {
    width: 14px;
    height: 14px;
    margin: 0;
    cursor: pointer;
    accent-color: #444;
    flex-shrink: 0;
  }

  /* Line swatch — solid bar */
  .swatch-line {
    width: 28px;
    height: 4px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Square swatch for Flexiride */
  .swatch-square {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1.5px solid rgba(0,0,0,0.15);
  }

  .legend-note {
    font-size: 11px;
    color: #aaa;
    font-style: italic;
    padding: 2px 2px 4px;
  }

  .legend-label {
    font-size: 12px;
    color: #222;
    font-family: Arial, Helvetica, sans-serif;
    line-height: 1.3;
  }

  .loading {
    padding: 3rem 2rem;
    text-align: center;
    color: #888;
    font-size: 14px;
  }
</style>
</head>
<body>

<h1>Melbourne PT Frequency Map</h1>
<p class="subtitle">Unofficial — current as of May 2026 · by Adam Bain</p>

<div class="map-container" id="mapContainer">
  <div id="map-svg-wrapper">
    <div class="loading">Loading map…</div>
  </div>

  <!-- Legend -->
  <button class="legend-btn" id="legendBtn" aria-expanded="false" aria-controls="legendPanel">
    <svg width="13" height="11" viewBox="0 0 13 11" fill="none">
      <rect x="0" y="0" width="7" height="2" rx="1" fill="#555"/>
      <rect x="9" y="0" width="4" height="2" rx="1" fill="#555"/>
      <rect x="0" y="4.5" width="7" height="2" rx="1" fill="#555"/>
      <rect x="9" y="4.5" width="4" height="2" rx="1" fill="#555"/>
      <rect x="0" y="9" width="7" height="2" rx="1" fill="#555"/>
      <rect x="9" y="9" width="4" height="2" rx="1" fill="#555"/>
    </svg>
    Legend
    <svg class="arrow" width="10" height="7" viewBox="0 0 10 7" fill="none">
      <path d="M1 1L5 5.5L9 1" stroke="#555" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="legend-panel" id="legendPanel" role="region" aria-label="Map legend">
    <p class="legend-section-title">Bus frequency</p>

    <!--
      data-layers: comma-separated layer IDs to toggle.
      Bus route lines + their matching route-label circles + station markers + train lines of same freq.
    -->
    <label class="legend-row" data-layers="layer3,layer5,layer40,layer74,layer60,layer49,layer67,layer27,g9425">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#671415"></span>
      <span class="legend-label">10 min or less</span>
    </label>
    <label class="legend-row" data-layers="layer6,layer24,layer42,layer73,layer59,layer50,layer66,layer28,g9426,g9427,g9424">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#a62624"></span>
      <span class="legend-label">15 minutes</span>
    </label>
    <label class="legend-row" data-layers="layer7,layer23,layer39,layer72,layer58,layer53,layer65,g22,g21">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#642d91"></span>
      <span class="legend-label">20 minutes</span>
    </label>
    <label class="legend-row" data-layers="layer8,layer14,layer41,layer71,layer57,layer52,layer64,g9423,g9422">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#2c8ab8"></span>
      <span class="legend-label">30 minutes</span>
    </label>
    <label class="legend-row" data-layers="layer9,layer22,layer43,layer70,layer56,layer51,layer63,g23">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#5d9a9d"></span>
      <span class="legend-label">40–60 minutes</span>
    </label>
    <label class="legend-row" data-layers="layer10,layer25,layer44,layer69,layer55,layer48,layer62,layer36">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#8d6f32"></span>
      <span class="legend-label">Peak only / limited service</span>
    </label>

    <hr class="legend-divider">
    <p class="legend-section-title">On-demand</p>

    <label class="legend-row" data-layers="layer4">
      <input type="checkbox" checked>
      <span class="swatch-square" style="background:#f5c96e"></span>
      <span class="legend-label">Flexiride</span>
    </label>

    <hr class="legend-divider">
    <p class="legend-section-title">Other features</p>
    <p class="legend-note">Always visible — not interactive</p>

    <div class="legend-row" style="cursor:default;">
      <span style="width:14px;flex-shrink:0"></span>
      <span class="swatch-line" style="background:#000; height:3px; opacity:0.5"></span>
      <span class="legend-label">Major road corridors</span>
    </div>
    <div class="legend-row" style="cursor:default;">
      <span style="width:14px;flex-shrink:0"></span>
      <span class="swatch-line" style="background:#888; height:2px;"></span>
      <span class="legend-label">Other roads</span>
    </div>
    <div class="legend-row" style="cursor:default;">
      <span style="width:14px;flex-shrink:0"></span>
      <span class="swatch-square" style="background:#b9d3b5; border-color:#8faa8b"></span>
      <span class="legend-label">Parks</span>
    </div>
    <div class="legend-row" style="cursor:default;">
      <span style="width:14px;flex-shrink:0"></span>
      <span class="swatch-square" style="background:#b5effb; border-color:#7dc8d8"></span>
      <span class="legend-label">Lakes &amp; waterways</span>
    </div>
    <div class="legend-row" style="cursor:default;">
      <span style="width:14px;flex-shrink:0"></span>
      <span class="swatch-square" style="background:#b0b0b0; border-color:#888"></span>
      <span class="legend-label">Suburb labels</span>
    </div>
  </div>

  <!-- Zoom controls -->
  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
    <button class="zoom-btn zoom-reset" id="zoomReset" title="Reset zoom">1:1</button>
    <button class="zoom-btn" id="zoomOut" title="Zoom out">−</button>
  </div>
</div>

<script>
// ── Load SVG ──────────────────────────────────────────────────────────────────
(async () => {
  const wrapper = document.getElementById('map-svg-wrapper');
  try {
    const res = await fetch('recent_map.svg');
    const text = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'image/svg+xml');
    const svg = doc.querySelector('svg');
    // Remove embedded legend layers
    ['layer5_legend', 'layer14_legend'].forEach(id => {
      const el = svg.getElementById(id);
      if (el) el.remove();
    });
    wrapper.innerHTML = '';
    wrapper.appendChild(svg);
    initZoom(svg);
  } catch (e) {
    wrapper.innerHTML = '<p style="padding:2rem;text-align:center;color:#888;font-size:13px;">Could not load <code>recent_map.svg</code> — make sure it is in the same folder.</p>';
  }
})();

// ── Legend toggle ─────────────────────────────────────────────────────────────
const btn = document.getElementById('legendBtn');
const panel = document.getElementById('legendPanel');

btn.addEventListener('click', () => {
  const open = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open);
});
document.addEventListener('click', e => {
  if (!btn.contains(e.target) && !panel.contains(e.target)) {
    panel.classList.remove('open');
    btn.classList.remove('open');
    btn.setAttribute('aria-expanded', false);
  }
});

// ── Layer toggles ─────────────────────────────────────────────────────────────
document.querySelectorAll('.legend-row[data-layers]').forEach(row => {
  const checkbox = row.querySelector('input[type="checkbox"]');
  const toggle = () => {
    const ids = row.dataset.layers.split(',');
    const hidden = !checkbox.checked;
    row.classList.toggle('hidden', hidden);
    ids.forEach(id => {
      const layer = document.getElementById(id.trim());
      if (layer) layer.style.display = hidden ? 'none' : '';
    });
  };
  checkbox.addEventListener('change', toggle);
  row.addEventListener('click', e => {
    if (e.target === checkbox) return;
    checkbox.checked = !checkbox.checked;
    toggle();
  });
});

// ── Zoom & Pan ────────────────────────────────────────────────────────────────
function initZoom(svg) {
  const container = document.getElementById('mapContainer');
  const wrapper = document.getElementById('map-svg-wrapper');

  let scale = 1;
  let tx = 0, ty = 0;
  const MIN_SCALE = 1, MAX_SCALE = 8, ZOOM_STEP = 1.35;

  function applyTransform() {
    // Clamp pan so map never drifts fully off-screen
    const ww = wrapper.clientWidth;
    const wh = wrapper.clientHeight || (ww * 0.8);
    const scaledW = ww * scale;
    const scaledH = wh * scale;
    tx = Math.min(0, Math.max(tx, ww - scaledW));
    ty = Math.min(0, Math.max(ty, wh - scaledH));
    svg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }

  function zoomAt(cx, cy, factor) {
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
    if (newScale === scale) return;
    // Adjust translation so zoom centres on (cx, cy) within the wrapper
    tx = cx - (cx - tx) * (newScale / scale);
    ty = cy - (cy - ty) * (newScale / scale);
    scale = newScale;
    applyTransform();
  }

  // Buttons
  document.getElementById('zoomIn').addEventListener('click', () => {
    const r = wrapper.getBoundingClientRect();
    zoomAt(r.width / 2, r.height / 2, ZOOM_STEP);
  });
  document.getElementById('zoomOut').addEventListener('click', () => {
    const r = wrapper.getBoundingClientRect();
    zoomAt(r.width / 2, r.height / 2, 1 / ZOOM_STEP);
  });
  document.getElementById('zoomReset').addEventListener('click', () => {
    scale = 1; tx = 0; ty = 0;
    applyTransform();
  });

  // Mouse wheel zoom
  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const r = wrapper.getBoundingClientRect();
    const cx = e.clientX - r.left;
    const cy = e.clientY - r.top;
    const factor = e.deltaY < 0 ? ZOOM_STEP : 1 / ZOOM_STEP;
    zoomAt(cx, cy, factor);
  }, { passive: false });

  // Mouse drag pan
  let dragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;

  wrapper.addEventListener('mousedown', e => {
    if (scale <= MIN_SCALE) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startTx = tx; startTy = ty;
    container.classList.add('panning');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    tx = startTx + (e.clientX - startX);
    ty = startTy + (e.clientY - startY);
    applyTransform();
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    container.classList.remove('panning');
  });

  // Touch pinch-zoom + drag
  let lastDist = null, lastMidX = 0, lastMidY = 0;
  let touchStartTx = 0, touchStartTy = 0, touchStartX = 0, touchStartY = 0;

  wrapper.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      const t0 = e.touches[0], t1 = e.touches[1];
      lastDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
      const r = wrapper.getBoundingClientRect();
      lastMidX = ((t0.clientX + t1.clientX) / 2) - r.left;
      lastMidY = ((t0.clientY + t1.clientY) / 2) - r.top;
    } else if (e.touches.length === 1) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchStartTx = tx; touchStartTy = ty;
    }
  }, { passive: true });

  wrapper.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const t0 = e.touches[0], t1 = e.touches[1];
      const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
      if (lastDist) zoomAt(lastMidX, lastMidY, dist / lastDist);
      lastDist = dist;
    } else if (e.touches.length === 1 && scale > MIN_SCALE) {
      tx = touchStartTx + (e.touches[0].clientX - touchStartX);
      ty = touchStartTy + (e.touches[0].clientY - touchStartY);
      applyTransform();
    }
  }, { passive: false });

  wrapper.addEventListener('touchend', () => { lastDist = null; });
}
</script>
</body>
</html>
