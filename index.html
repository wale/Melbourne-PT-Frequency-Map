<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melbourne PT Frequency Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 3rem;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 0.25rem;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #666;
    margin-bottom: 1.25rem;
  }

  .map-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    cursor: grab;
  }
  .map-container.panning { cursor: grabbing; }

  /* Zoom buttons */
  .zoom-controls {
    position: absolute;
    bottom: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    z-index: 20;
  }
  .zoom-btn {
    width: 30px;
    height: 30px;
    background: #fff;
    border: 1px solid #bbb;
    border-radius: 5px;
    font-size: 18px;
    font-weight: 300;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    color: #333;
    transition: background 0.1s;
    user-select: none;
  }
  .zoom-btn:hover { background: #f0f0f0; }
  .zoom-btn.zoom-reset { font-size: 11px; font-weight: 600; letter-spacing: -0.03em; }

  #map-svg-wrapper {
    width: 100%;
    display: block;
    overflow: hidden;
    touch-action: none;
  }

  #map-svg-wrapper svg {
    width: 100%;
    display: block;
    /* NO CSS transform — zoom is done via viewBox */
    height: auto;
    display: block;
  }

  /* Legend toggle button */
  .legend-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #fff;
    border: 1px solid #bbb;
    border-radius: 6px;
    padding: 6px 11px 6px 9px;
    font-size: 12px;
    font-weight: 600;
    font-family: Arial, Helvetica, sans-serif;
    color: #222;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    z-index: 20;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    transition: background 0.12s;
  }
  .legend-btn:hover { background: #f5f5f5; }
  .legend-btn svg { flex-shrink: 0; }
  .legend-btn .arrow { transition: transform 0.18s; }
  .legend-btn.open .arrow { transform: rotate(180deg); }

  /* Dropdown panel */
  .legend-panel {
    position: absolute;
    top: 44px;
    right: 10px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 7px;
    padding: 12px 14px 10px;
    min-width: 210px;
    z-index: 20;
    box-shadow: 0 4px 16px rgba(0,0,0,0.13);
    opacity: 0;
    pointer-events: none;
    transform: translateY(-6px);
    transition: opacity 0.18s, transform 0.18s;
  }
  .legend-panel.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .legend-section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
    margin-bottom: 8px;
    margin-top: 4px;
  }
  .legend-section-title:first-child { margin-top: 0; }

  .legend-divider {
    border: none;
    border-top: 1px solid #eee;
    margin: 8px 0;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 3px 0;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.15s;
    user-select: none;
  }
  .legend-row:hover { background: #f8f8f8; }
  .legend-row.hidden { opacity: 0.35; }

  .legend-row input[type="checkbox"] {
    width: 14px;
    height: 14px;
    margin: 0;
    cursor: pointer;
    accent-color: #444;
    flex-shrink: 0;
  }

  .swatch-line {
    width: 28px;
    height: 4px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .swatch-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .swatch-rect {
    width: 16px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .legend-label {
    font-size: 12px;
    color: #222;
    font-family: Arial, Helvetica, sans-serif;
    line-height: 1.3;
  }

  .loading {
    padding: 3rem 2rem;
    text-align: center;
    color: #888;
    font-size: 14px;
  }

  .show-original-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    padding: 0;
    background: none;
    border: none;
    font-size: 11px;
    color: #666;
    cursor: pointer;
    font-family: Arial, Helvetica, sans-serif;
    text-decoration: underline;
  }
  .show-original-btn:hover { color: #333; }
</style>
</head>
<body>

<h1>Melbourne PT-Frequency Map</h1>
<p class="subtitle">Unofficial — current as of May 2026 · by Adam Bain</p>

<div class="map-container">
  <div id="map-svg-wrapper">
    <div class="loading">Loading map…</div>
  </div>

  <button class="legend-btn" id="legendBtn" aria-expanded="false" aria-controls="legendPanel">
    <svg width="13" height="11" viewBox="0 0 13 11" fill="none">
      <rect x="0" y="0" width="7" height="2" rx="1" fill="#555"/>
      <rect x="9" y="0" width="4" height="2" rx="1" fill="#555"/>
      <rect x="0" y="4.5" width="7" height="2" rx="1" fill="#555"/>
      <rect x="9" y="4.5" width="4" height="2" rx="1" fill="#555"/>
      <rect x="0" y="9" width="7" height="2" rx="1" fill="#555"/>
      <rect x="9" y="9" width="4" height="2" rx="1" fill="#555"/>
    </svg>
    Legend
    <svg class="arrow" width="10" height="7" viewBox="0 0 10 7" fill="none">
      <path d="M1 1L5 5.5L9 1" stroke="#555" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="legend-panel" id="legendPanel" role="region" aria-label="Map legend">
    <p class="legend-section-title">Service frequency</p>

    <label class="legend-row" data-layers="layer3">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#671415"></span>
      <span class="legend-label">10 min or less</span>
    </label>
    <label class="legend-row" data-layers="layer6">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#a62624"></span>
      <span class="legend-label">15 minutes</span>
    </label>
    <label class="legend-row" data-layers="layer7">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#642d91"></span>
      <span class="legend-label">20 minutes</span>
    </label>
    <label class="legend-row" data-layers="layer8">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#2c8ab8"></span>
      <span class="legend-label">30 minutes</span>
    </label>
    <label class="legend-row" data-layers="layer9">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#5d9a9d"></span>
      <span class="legend-label">40–60 minutes</span>
    </label>
    <label class="legend-row" data-layers="layer10">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#8d6f32; border-top: 2px dashed #8d6f32; background: none; border-bottom: none;"></span>
      <span class="legend-label">Peak only / limited service</span>
    </label>
    <label class="legend-row" data-layers="layer4">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#e8a020"></span>
      <span class="legend-label">Flexiride</span>
    </label>

    <hr class="legend-divider">
    <p class="legend-section-title">Features</p>

    <label class="legend-row" data-layers="layer11">
      <input type="checkbox" checked>
      <span class="swatch-dot" style="background:#333"></span>
      <span class="legend-label">Interchanges</span>
    </label>
    <label class="legend-row" data-layers="layer17">
      <input type="checkbox" checked>
      <span class="swatch-dot" style="background:#7a7a7a"></span>
      <span class="legend-label">Points of interest</span>
    </label>
    <label class="legend-row" data-layers="layer18,layer20,layer1">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#2c8ab8; height: 3px;"></span>
      <span class="legend-label">Train routes &amp; stations</span>
    </label>
    <label class="legend-row" data-layers="layer16">
      <input type="checkbox" checked>
      <span class="swatch-rect" style="background:#b9d3b5; border: 1px solid #8faa8b;"></span>
      <span class="legend-label">Parks</span>
    </label>
    <label class="legend-row" data-layers="layer21">
      <input type="checkbox" checked>
      <span class="swatch-rect" style="background:#b5effb; border: 1px solid #7dc8d8;"></span>
      <span class="legend-label">Lakes &amp; waterways</span>
    </label>
    <label class="legend-row" data-layers="layer13">
      <input type="checkbox" checked>
      <span class="legend-label" style="color:#888; font-style: italic;">Suburb labels</span>
    </label>

    <hr class="legend-divider">
    <p class="legend-section-title">Route circles</p>
    <label class="legend-row" data-layers="layer12,layer2">
      <input type="checkbox" checked>
      <span class="legend-label" style="color:#555;">Route numbers &amp; labels</span>
    </label>

  </div>
  <!-- Zoom controls -->
  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomIn"    title="Zoom in">+</button>
    <button class="zoom-btn zoom-reset" id="zoomReset" title="Reset zoom">1:1</button>
    <button class="zoom-btn" id="zoomOut"   title="Zoom out">−</button>
  </div>
</div>

<script>
// ── Load SVG then init zoom ───────────────────────────────────────────────────
(async () => {
  const wrapper = document.getElementById('map-svg-wrapper');
  try {
    const res = await fetch('recent_map.svg');
    const text = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'image/svg+xml');
    const svg = doc.querySelector('svg');

    // Remove embedded legend layers
    ['layer5', 'layer14'].forEach(id => {
      const el = svg.getElementById(id);
      if (el) el.remove();
    });

    // Make SVG responsive — keep its natural aspect ratio, fill container width
    svg.removeAttribute('width');
    svg.removeAttribute('height');
    svg.style.width = '100%';
    svg.style.display = 'block';

    wrapper.innerHTML = '';
    wrapper.appendChild(svg);
    initZoom(svg);
  } catch (e) {
    wrapper.innerHTML = '<p style="padding:2rem;text-align:center;color:#888;font-size:13px;">Could not load <code>recent_map.svg</code> — make sure it is in the same folder.</p>';
  }
})();

// ── viewBox-based zoom & pan ──────────────────────────────────────────────────
// Zooming shrinks/moves the viewBox window, so the browser re-renders at full
// vector quality. No CSS transform = no rasterisation artefacts.
function initZoom(svg) {
  const container = document.getElementById('mapContainer');
  const wrapper   = document.getElementById('map-svg-wrapper');

  // Parse the original viewBox
  const vbParts = svg.getAttribute('viewBox').split(/[\s,]+/).map(Number);
  const origVB = { x: vbParts[0], y: vbParts[1], w: vbParts[2], h: vbParts[3] };

  // Current viewBox state
  let vb = { ...origVB };

  const MIN_SCALE = 1, MAX_SCALE = 12, ZOOM_STEP = 1.35;

  function setViewBox() {
    svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  }

  // Convert a point in wrapper-pixel space to SVG viewBox space
  function toSVG(px, py) {
    const rect = wrapper.getBoundingClientRect();
    const ratioX = vb.w / rect.width;
    const ratioY = vb.h / rect.height;
    return {
      x: vb.x + px * ratioX,
      y: vb.y + py * ratioY,
    };
  }

  function currentScale() { return origVB.w / vb.w; }

  function zoomAt(px, py, factor) {
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, currentScale() * factor));
    const targetW = origVB.w / newScale;
    const targetH = origVB.h / newScale;
    // Zoom towards the SVG point under the cursor
    const pt = toSVG(px, py);
    const rx = (pt.x - vb.x) / vb.w; // relative position within current vb
    const ry = (pt.y - vb.y) / vb.h;
    vb.w = targetW;
    vb.h = targetH;
    vb.x = pt.x - rx * vb.w;
    vb.y = pt.y - ry * vb.h;
    clamp();
    setViewBox();
  }

  function clamp() {
    vb.x = Math.min(origVB.x + origVB.w - vb.w, Math.max(origVB.x, vb.x));
    vb.y = Math.min(origVB.y + origVB.h - vb.h, Math.max(origVB.y, vb.y));
  }

  // ── Buttons
  document.getElementById('zoomIn').addEventListener('click', () => {
    const r = wrapper.getBoundingClientRect();
    zoomAt(r.width / 2, r.height / 2, ZOOM_STEP);
  });
  document.getElementById('zoomOut').addEventListener('click', () => {
    const r = wrapper.getBoundingClientRect();
    zoomAt(r.width / 2, r.height / 2, 1 / ZOOM_STEP);
  });
  document.getElementById('zoomReset').addEventListener('click', () => {
    vb = { ...origVB };
    setViewBox();
  });

  // ── Mouse wheel
  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const r = wrapper.getBoundingClientRect();
    zoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY < 0 ? ZOOM_STEP : 1 / ZOOM_STEP);
  }, { passive: false });

  // ── Mouse drag pan
  let dragging = false, dragStartPt = null, dragStartVB = null;

  wrapper.addEventListener('mousedown', e => {
    if (currentScale() <= MIN_SCALE) return;
    dragging = true;
    dragStartPt = toSVG(e.clientX - wrapper.getBoundingClientRect().left,
                        e.clientY - wrapper.getBoundingClientRect().top);
    dragStartVB = { ...vb };
    container.classList.add('panning');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const r = wrapper.getBoundingClientRect();
    const ratioX = vb.w / r.width;
    const ratioY = vb.h / r.height;
    vb.x = dragStartVB.x - ((e.clientX - r.left) - (dragStartPt.x - dragStartVB.x) / ratioX) * ratioX;
    vb.y = dragStartVB.y - ((e.clientY - r.top)  - (dragStartPt.y - dragStartVB.y) / ratioY) * ratioY;
    clamp();
    setViewBox();
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    container.classList.remove('panning');
  });

  // ── Touch pinch + drag
  let lastTouches = null;

  wrapper.addEventListener('touchstart', e => {
    lastTouches = Array.from(e.touches).map(t => ({
      x: t.clientX - wrapper.getBoundingClientRect().left,
      y: t.clientY - wrapper.getBoundingClientRect().top,
    }));
  }, { passive: true });

  wrapper.addEventListener('touchmove', e => {
    e.preventDefault();
    const r = wrapper.getBoundingClientRect();
    const touches = Array.from(e.touches).map(t => ({
      x: t.clientX - r.left,
      y: t.clientY - r.top,
    }));

    if (touches.length === 2 && lastTouches && lastTouches.length === 2) {
      const prev = lastTouches, cur = touches;
      const prevDist = Math.hypot(prev[1].x - prev[0].x, prev[1].y - prev[0].y);
      const curDist  = Math.hypot(cur[1].x  - cur[0].x,  cur[1].y  - cur[0].y);
      const midX = (cur[0].x + cur[1].x) / 2;
      const midY = (cur[0].y + cur[1].y) / 2;
      if (prevDist > 0) zoomAt(midX, midY, curDist / prevDist);
    } else if (touches.length === 1 && lastTouches && lastTouches.length === 1 && currentScale() > MIN_SCALE) {
      const dx = (touches[0].x - lastTouches[0].x) * vb.w / r.width;
      const dy = (touches[0].y - lastTouches[0].y) * vb.h / r.height;
      vb.x -= dx;
      vb.y -= dy;
      clamp();
      setViewBox();
    }
    lastTouches = touches;
  }, { passive: false });

  wrapper.addEventListener('touchend', () => { lastTouches = null; });
}

// Legend toggle
const btn = document.getElementById('legendBtn');
const panel = document.getElementById('legendPanel');

btn.addEventListener('click', () => {
  const open = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open);
});

document.addEventListener('click', e => {
  if (!btn.contains(e.target) && !panel.contains(e.target)) {
    panel.classList.remove('open');
    btn.classList.remove('open');
    btn.setAttribute('aria-expanded', false);
  }
});

// Layer toggles
document.querySelectorAll('.legend-row[data-layers]').forEach(row => {
  const checkbox = row.querySelector('input[type="checkbox"]');

  const toggle = () => {
    const layerIds = row.dataset.layers.split(',');
    const hidden = !checkbox.checked;
    row.classList.toggle('hidden', hidden);

    layerIds.forEach(id => {
      const layer = document.getElementById(id.trim());
      if (layer) {
        layer.style.display = hidden ? 'none' : '';
      }
    });
  };

  checkbox.addEventListener('change', toggle);
  // Allow clicking the row itself (but not the checkbox twice)
  row.addEventListener('click', e => {
    if (e.target === checkbox) return;
    checkbox.checked = !checkbox.checked;
    toggle();
  });
});
</script>
</body>
</html>
