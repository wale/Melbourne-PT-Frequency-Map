<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melbourne PT Frequency Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 3rem;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 0.25rem;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #666;
    margin-bottom: 1.25rem;
  }

  .map-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    cursor: grab;
  }
  .map-container.panning { cursor: grabbing; }

  .zoom-controls {
    position: absolute;
    bottom: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    z-index: 20;
  }
  .zoom-btn {
    width: 30px;
    height: 30px;
    background: #fff;
    border: 1px solid #bbb;
    border-radius: 5px;
    font-size: 18px;
    font-weight: 300;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    color: #333;
    transition: background 0.1s;
    user-select: none;
  }
  .zoom-btn:hover { background: #f0f0f0; }
  .zoom-btn.zoom-reset { font-size: 11px; font-weight: 600; letter-spacing: -0.03em; }

  #map-svg-wrapper {
    width: 100%;
    display: block;
    overflow: hidden;
    touch-action: none;
  }

  #map-svg-wrapper svg {
    width: 100%;
    height: auto;
    display: block;
    /* zoom via viewBox — no CSS transform, no rasterisation */
  }

  .legend-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #fff;
    border: 1px solid #bbb;
    border-radius: 6px;
    padding: 6px 11px 6px 9px;
    font-size: 12px;
    font-weight: 600;
    font-family: Arial, Helvetica, sans-serif;
    color: #222;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    z-index: 20;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    transition: background 0.12s;
  }
  .legend-btn:hover { background: #f5f5f5; }
  .legend-btn svg { flex-shrink: 0; }
  .legend-btn .arrow { transition: transform 0.18s; }
  .legend-btn.open .arrow { transform: rotate(180deg); }

  .legend-panel {
    position: absolute;
    top: 44px;
    right: 10px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 7px;
    padding: 12px 14px 10px;
    min-width: 210px;
    z-index: 20;
    box-shadow: 0 4px 16px rgba(0,0,0,0.13);
    opacity: 0;
    pointer-events: none;
    transform: translateY(-6px);
    transition: opacity 0.18s, transform 0.18s;
  }
  .legend-panel.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .legend-section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
    margin-bottom: 8px;
    margin-top: 4px;
  }
  .legend-section-title:first-child { margin-top: 0; }

  .legend-divider {
    border: none;
    border-top: 1px solid #eee;
    margin: 8px 0;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 3px 0;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.15s;
    user-select: none;
  }
  .legend-row:hover { background: #f8f8f8; }
  .legend-row.hidden { opacity: 0.35; }

  .legend-row input[type="checkbox"] {
    width: 14px;
    height: 14px;
    margin: 0;
    cursor: pointer;
    accent-color: #444;
    flex-shrink: 0;
  }

  .swatch-line {
    width: 28px;
    height: 4px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .swatch-square {
    width: 13px;
    height: 13px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .swatch-rect {
    width: 16px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .legend-label {
    font-size: 12px;
    color: #222;
    font-family: Arial, Helvetica, sans-serif;
    line-height: 1.3;
  }

  .loading {
    padding: 3rem 2rem;
    text-align: center;
    color: #888;
    font-size: 14px;
  }
</style>
</head>
<body>

<h1>Melbourne PT Frequency Map</h1>
<p class="subtitle">Unofficial — current as of May 2026 · by Adam Bain</p>

<div class="map-container" id="mapContainer">
  <div id="map-svg-wrapper">
    <div class="loading">Loading map…</div>
  </div>

  <button class="legend-btn" id="legendBtn" aria-expanded="false" aria-controls="legendPanel">
    <svg width="13" height="11" viewBox="0 0 13 11" fill="none">
      <rect x="0" y="0" width="7" height="2" rx="1" fill="#555"/>
      <rect x="9" y="0" width="4" height="2" rx="1" fill="#555"/>
      <rect x="0" y="4.5" width="7" height="2" rx="1" fill="#555"/>
      <rect x="9" y="4.5" width="4" height="2" rx="1" fill="#555"/>
      <rect x="0" y="9" width="7" height="2" rx="1" fill="#555"/>
      <rect x="9" y="9" width="4" height="2" rx="1" fill="#555"/>
    </svg>
    Legend
    <svg class="arrow" width="10" height="7" viewBox="0 0 10 7" fill="none">
      <path d="M1 1L5 5.5L9 1" stroke="#555" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="legend-panel" id="legendPanel" role="region" aria-label="Map legend">
    <p class="legend-section-title">Bus frequency</p>

    <!--
      data-layers uses Inkscape label names, not IDs.
      Format: "Parent Label > Child Label" for nested layers,
              or bare "Label" for top-level layers.
      The JS resolves these via inkscape:label attributes after SVG load,
      so renaming a layer in Inkscape + updating the name here is all that's needed.
    -->

    <label class="legend-row" data-layers="
        Bus Routes > 10,
        Frequency Transitions > 10,
        Stations > 10,
        Text > 10,
        Route Termini > 10,
        Express Stops > 10,
        Route Labels > 10,
        Route Arrows > 10,
        Lines > Cbe/Pkm">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#671415"></span>
      <span class="legend-label">10 min or less</span>
    </label>

    <label class="legend-row" data-layers="
        Bus Routes > 15,
        Frequency Transitions > 15,
        Stations > 15,
        Text > 15,
        Route Termini > 15,
        Express Stops > 15,
        Route Labels > 15,
        Route Arrows > 15,
        Lines > Glen Waverley,
        Lines > Bel/Lil,
        Lines > Alamein">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#a62624"></span>
      <span class="legend-label">15 minutes</span>
    </label>

    <label class="legend-row" data-layers="
        Bus Routes > 20,
        Frequency Transitions > 20,
        Stations > 20,
        Text > 20,
        Route Termini > 20,
        Express Stops > 20,
        Route Labels > 20,
        Route Arrows > 20,
        Lines > Hurstbridge Inner">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#642d91"></span>
      <span class="legend-label">20 minutes</span>
    </label>

    <label class="legend-row" data-layers="
        Bus Routes > 30,
        Frequency Transitions > 30,
        Stations > 30,
        Text > 30,
        Route Termini > 30,
        Express Stops > 30,
        Route Labels > 30,
        Route Arrows > 30,
        Lines > Lilydale Outer,
        Lines > Belgrave Outer">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#2c8ab8"></span>
      <span class="legend-label">30 minutes</span>
    </label>

    <label class="legend-row" data-layers="
        Bus Routes > 60,
        Frequency Transitions > 60,
        Stations > 60,
        Text > 60,
        Route Termini > 60,
        Express Stops > 60,
        Route Labels > 60,
        Route Arrows > 60,
        Lines > Hurstbridge Outer">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#5d9a9d"></span>
      <span class="legend-label">40–60 minutes</span>
    </label>

    <label class="legend-row" data-layers="
        Bus Routes > PO/LS,
        Frequency Transitions > PO/LS,
        Stations > PO/LS,
        Text > PO/LS,
        Route Termini > PO/LS,
        Express Stops > PO/LS,
        Route Labels > PO/LS,
        Route Arrows > PO/LS,
        Easterm Freeway 1 > PO/LS">
      <input type="checkbox" checked>
      <span class="swatch-line" style="background:#8d6f32"></span>
      <span class="legend-label">Peak only / limited service</span>
    </label>

    <label class="legend-row" data-layers="Flexiride">
      <input type="checkbox" checked>
      <span class="swatch-square" style="background:#e8920a; border: 1.5px solid #b86d05;"></span>
      <span class="legend-label">Flexiride</span>
    </label>

    <hr class="legend-divider">
    <p class="legend-section-title">Other features</p>

    <div class="legend-row" style="cursor:default;">
      <span style="width:14px;flex-shrink:0"></span>
      <span class="swatch-line" style="background:#000; height:3px; opacity:0.5"></span>
      <span class="legend-label">Major road corridors</span>
    </div>
    <div class="legend-row" style="cursor:default;">
      <span style="width:14px;flex-shrink:0"></span>
      <span class="swatch-line" style="background:#888; height:2px;"></span>
      <span class="legend-label">Other roads</span>
    </div>
    <div class="legend-row" style="cursor:default;">
      <span style="width:14px;flex-shrink:0"></span>
      <span class="swatch-rect" style="background:#b9d3b5; border: 1px solid #8faa8b;"></span>
      <span class="legend-label">Parks</span>
    </div>
    <div class="legend-row" style="cursor:default;">
      <span style="width:14px;flex-shrink:0"></span>
      <span class="swatch-rect" style="background:#b5effb; border: 1px solid #7dc8d8;"></span>
      <span class="legend-label">Lakes &amp; waterways</span>
    </div>
    <div class="legend-row" style="cursor:default;">
      <span style="width:14px;flex-shrink:0"></span>
      <span class="swatch-rect" style="background:#e0e0e0; border: 1px solid #bbb;"></span>
      <span class="legend-label">Suburb labels</span>
    </div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
    <button class="zoom-btn zoom-reset" id="zoomReset" title="Reset zoom">1:1</button>
    <button class="zoom-btn" id="zoomOut" title="Zoom out">−</button>
  </div>
</div>

<script>
// ── Load SVG ──────────────────────────────────────────────────────────────────
(async () => {
  const wrapper = document.getElementById('map-svg-wrapper');
  try {
    const res = await fetch('recent_map.svg');
    const text = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'image/svg+xml');
    const svg = doc.querySelector('svg');

    svg.removeAttribute('width');
    svg.removeAttribute('height');
    svg.style.width = '100%';
    svg.style.display = 'block';

    wrapper.innerHTML = '';
    wrapper.appendChild(svg);

    initLabelMap(svg);
    initToggles();
    initZoom(svg);
  } catch (e) {
    wrapper.innerHTML = '<p style="padding:2rem;text-align:center;color:#888;font-size:13px;">Could not load <code>recent_map.svg</code> — make sure it is in the same folder.</p>';
  }
})();

// ── Label map ─────────────────────────────────────────────────────────────────
// Resolves human-readable layer names from data-layers attributes.
//
// Supports two key formats:
//   "Label"            — matches any <g inkscape:label="Label">
//   "Parent > Child"   — matches a child layer by both its own label
//                        and its direct parent's label (avoids collisions
//                        when the same frequency label "10", "15" etc.
//                        appears under multiple parent groups)
let labelMap = {};

function initLabelMap(svg) {
  labelMap = {};

  // Map each element ID to its parent element
  const parentOf = {};
  svg.querySelectorAll('g').forEach(el => {
    Array.from(el.children).forEach(child => {
      if (child.tagName === 'g') {
        parentOf[child.getAttribute('id') || ''] = el;
      }
    });
  });

  const getLabel = el => el.getAttribute('inkscape:label') || '';

  svg.querySelectorAll('g[inkscape\\:label]').forEach(el => {
    const label = getLabel(el);
    if (!label) return;

    // Bare label — first match wins (top-level layers typically unique)
    if (!labelMap[label]) labelMap[label] = el;

    // "Parent > Child" key
    const parent = parentOf[el.getAttribute('id') || ''];
    if (parent) {
      const parentLabel = getLabel(parent);
      if (parentLabel) {
        const key = `${parentLabel} > ${label}`;
        if (!labelMap[key]) labelMap[key] = el;
      }
    }
  });
}

function resolveLayer(rawKey) {
  return labelMap[rawKey.trim()] || null;
}

// ── Legend dropdown ───────────────────────────────────────────────────────────
const legendBtn   = document.getElementById('legendBtn');
const legendPanel = document.getElementById('legendPanel');

legendBtn.addEventListener('click', () => {
  const open = legendPanel.classList.toggle('open');
  legendBtn.classList.toggle('open', open);
  legendBtn.setAttribute('aria-expanded', open);
});
document.addEventListener('click', e => {
  if (!legendBtn.contains(e.target) && !legendPanel.contains(e.target)) {
    legendPanel.classList.remove('open');
    legendBtn.classList.remove('open');
    legendBtn.setAttribute('aria-expanded', false);
  }
});

// ── Layer toggles ─────────────────────────────────────────────────────────────
function initToggles() {
  document.querySelectorAll('.legend-row[data-layers]').forEach(row => {
    const checkbox = row.querySelector('input[type="checkbox"]');

    const toggle = () => {
      const keys  = row.dataset.layers.split(',');
      const hidden = !checkbox.checked;
      row.classList.toggle('hidden', hidden);
      keys.forEach(key => {
        const layer = resolveLayer(key);
        if (layer) layer.style.display = hidden ? 'none' : '';
      });
    };

    checkbox.addEventListener('change', toggle);
    row.addEventListener('click', e => {
      if (e.target === checkbox) return;
      checkbox.checked = !checkbox.checked;
      toggle();
    });
  });
}

// ── viewBox zoom & pan ────────────────────────────────────────────────────────
// Shrinks/shifts the SVG viewBox rather than using CSS transform, so the
// browser re-rasterises paths at full resolution on every zoom step.
function initZoom(svg) {
  const container = document.getElementById('mapContainer');
  const wrapper   = document.getElementById('map-svg-wrapper');

  const vbParts = svg.getAttribute('viewBox').split(/[\s,]+/).map(Number);
  const origVB  = { x: vbParts[0], y: vbParts[1], w: vbParts[2], h: vbParts[3] };
  let vb = { ...origVB };

  const MIN_SCALE = 1, MAX_SCALE = 12, ZOOM_STEP = 1.35;

  function setViewBox() {
    svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  }

  function toSVG(px, py) {
    const r = wrapper.getBoundingClientRect();
    return { x: vb.x + px * (vb.w / r.width), y: vb.y + py * (vb.h / r.height) };
  }

  function currentScale() { return origVB.w / vb.w; }

  function zoomAt(px, py, factor) {
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, currentScale() * factor));
    const targetW  = origVB.w / newScale;
    const targetH  = origVB.h / newScale;
    const pt = toSVG(px, py);
    const rx = (pt.x - vb.x) / vb.w;
    const ry = (pt.y - vb.y) / vb.h;
    vb.w = targetW; vb.h = targetH;
    vb.x = pt.x - rx * vb.w;
    vb.y = pt.y - ry * vb.h;
    clamp(); setViewBox();
  }

  function clamp() {
    vb.x = Math.min(origVB.x + origVB.w - vb.w, Math.max(origVB.x, vb.x));
    vb.y = Math.min(origVB.y + origVB.h - vb.h, Math.max(origVB.y, vb.y));
  }

  // Buttons
  document.getElementById('zoomIn').addEventListener('click', () => {
    const r = wrapper.getBoundingClientRect();
    zoomAt(r.width / 2, r.height / 2, ZOOM_STEP);
  });
  document.getElementById('zoomOut').addEventListener('click', () => {
    const r = wrapper.getBoundingClientRect();
    zoomAt(r.width / 2, r.height / 2, 1 / ZOOM_STEP);
  });
  document.getElementById('zoomReset').addEventListener('click', () => {
    vb = { ...origVB }; setViewBox();
  });

  // Scroll wheel
  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const r = wrapper.getBoundingClientRect();
    zoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY < 0 ? ZOOM_STEP : 1 / ZOOM_STEP);
  }, { passive: false });

  // Mouse drag
  let dragging = false, dragStartPt = null, dragStartVB = null;

  wrapper.addEventListener('mousedown', e => {
    if (currentScale() <= MIN_SCALE) return;
    dragging = true;
    const r = wrapper.getBoundingClientRect();
    dragStartPt = toSVG(e.clientX - r.left, e.clientY - r.top);
    dragStartVB = { ...vb };
    container.classList.add('panning');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const r = wrapper.getBoundingClientRect();
    const rx = vb.w / r.width, ry = vb.h / r.height;
    vb.x = dragStartVB.x - ((e.clientX - r.left) - (dragStartPt.x - dragStartVB.x) / rx) * rx;
    vb.y = dragStartVB.y - ((e.clientY - r.top)  - (dragStartPt.y - dragStartVB.y) / ry) * ry;
    clamp(); setViewBox();
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    container.classList.remove('panning');
  });

  // Touch pinch + drag
  let lastTouches = null;

  wrapper.addEventListener('touchstart', e => {
    const r = wrapper.getBoundingClientRect();
    lastTouches = Array.from(e.touches).map(t => ({ x: t.clientX - r.left, y: t.clientY - r.top }));
  }, { passive: true });

  wrapper.addEventListener('touchmove', e => {
    e.preventDefault();
    const r = wrapper.getBoundingClientRect();
    const cur = Array.from(e.touches).map(t => ({ x: t.clientX - r.left, y: t.clientY - r.top }));

    if (cur.length === 2 && lastTouches?.length === 2) {
      const prevD = Math.hypot(lastTouches[1].x - lastTouches[0].x, lastTouches[1].y - lastTouches[0].y);
      const curD  = Math.hypot(cur[1].x - cur[0].x, cur[1].y - cur[0].y);
      if (prevD > 0) zoomAt((cur[0].x + cur[1].x) / 2, (cur[0].y + cur[1].y) / 2, curD / prevD);
    } else if (cur.length === 1 && lastTouches?.length === 1 && currentScale() > MIN_SCALE) {
      vb.x -= (cur[0].x - lastTouches[0].x) * vb.w / r.width;
      vb.y -= (cur[0].y - lastTouches[0].y) * vb.h / r.height;
      clamp(); setViewBox();
    }
    lastTouches = cur;
  }, { passive: false });

  wrapper.addEventListener('touchend', () => { lastTouches = null; });
}
</script>
</body>
</html>
